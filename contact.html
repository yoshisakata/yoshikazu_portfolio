<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YOSHIKAZU SAKATA — Contact</title>
<meta name="description" content="阪田義和 — 撮影・編集のご相談、お見積りはお気軽にどうぞ。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FCFCFA;--ink:#161513;--muted:#9C988F;--line:#E8E5DE;--frame:#F0EEE8;
    --sans:"Jost","Zen Kaku Gothic New",system-ui,sans-serif;--jp:"Zen Kaku Gothic New",system-ui,sans-serif;
    --gutter:clamp(18px,3.6vw,60px);--ease:cubic-bezier(.22,.61,.36,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-weight:300;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  img{display:block;max-width:100%}a{color:inherit;text-decoration:none}
  ::selection{background:var(--ink);color:var(--paper)}

  header{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
    padding:18px var(--gutter);border-bottom:1px solid var(--line)}
  header::before{content:"";position:absolute;inset:0;z-index:-1;
    background:color-mix(in srgb,var(--paper) 86%,transparent);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  .logo{font-size:12px;letter-spacing:.42em;font-weight:400;padding-left:.42em;white-space:nowrap}
  nav.main{display:flex;gap:clamp(16px,2.2vw,32px)}
  nav.main a{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);transition:color .35s var(--ease)}
  nav.main a:hover,nav.main a.active{color:var(--ink)}
  .nav-social{display:none}
  .burger{display:none;position:relative;z-index:60;flex-direction:column;gap:5px;background:none;border:0;cursor:pointer;padding:4px}
  .burger span{width:22px;height:1px;background:var(--ink);display:block;transition:.4s var(--ease)}

  .wrap{max-width:640px;margin:0 auto;padding:clamp(64px,10vh,110px) var(--gutter) clamp(70px,10vh,110px)}
  .lbl{font-size:10.5px;letter-spacing:.4em;text-transform:uppercase;color:var(--muted)}
  .intro{font-family:var(--jp);font-weight:300;font-size:12.5px;line-height:2.2;color:var(--ink);margin-top:22px;max-width:100%}
  .intro.intro-sub{font-size:11.5px;color:var(--muted);margin-top:10px}
  .intro .intro-l2{display:inline}
  @media(max-width:680px){
    .intro .intro-l2{display:block}
  }

  form{margin-top:clamp(44px,7vw,64px)}
  .field{margin-top:30px}
  .field label{display:block;font-family:var(--jp);font-size:13px;letter-spacing:.02em;color:var(--ink)}
  .field label .req{font-family:var(--sans);font-size:10.5px;letter-spacing:.04em;color:var(--muted);margin-left:2px}
  .field input,.field textarea{
    width:100%;margin-top:10px;background:var(--frame);border:1px solid var(--line);
    padding:13px 14px;font-family:var(--jp);font-size:13.5px;color:var(--ink);
    transition:border-color .3s var(--ease);
  }
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--ink)}
  .field textarea{resize:vertical;min-height:110px;line-height:1.8}
  .field textarea#f-notes{min-height:80px}

  .submit{margin-top:38px;padding:14px 38px;background:none;border:1px solid var(--ink);color:var(--ink);
    font-family:var(--sans);font-size:11px;letter-spacing:.24em;text-transform:uppercase;cursor:pointer;
    transition:background .35s var(--ease),color .35s var(--ease)}
  .submit:hover{background:var(--ink);color:var(--paper)}
  .sent{margin-top:20px;font-family:var(--jp);font-size:12.5px;color:var(--muted);display:none}
  .sent.error{color:#b5564a}
  .submit:disabled{opacity:.6;cursor:default}
  .sent.show{display:block}

  footer{padding:clamp(50px,8vw,90px) var(--gutter) 36px;display:flex;flex-direction:column;align-items:center;gap:22px;
    border-top:1px solid var(--line)}
  .f-social{display:flex;gap:30px;flex-wrap:wrap;justify-content:center}
  .f-social a{display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);transition:color .35s var(--ease)}
  .f-social a:hover{color:var(--ink)}
  .f-social svg{width:13px;height:13px;stroke:currentColor;fill:none}
  .f-meta{display:flex;gap:18px}
  .f-meta span{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}

  @media(max-width:680px){
    .burger{display:flex}
    nav.main{position:fixed;inset:0;background:var(--paper);flex-direction:column;align-items:center;justify-content:center;gap:36px;transform:translateY(-101%);transition:transform .6s var(--ease);z-index:40}
    body.open nav.main{transform:none}
    nav.main a{font-size:15px;letter-spacing:.3em;color:var(--ink)}
    .nav-social{display:flex;gap:26px;margin-top:4px}
    .nav-social a{color:var(--muted);transition:color .35s var(--ease)}
    .nav-social a:hover{color:var(--ink)}
    .nav-social svg{width:19px;height:19px;stroke:currentColor;fill:none}
    body.open .burger span:nth-child(1){transform:translateY(6px) rotate(45deg)}
    body.open .burger span:nth-child(2){opacity:0}
    body.open .burger span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
  }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">YOSHIKAZU SAKATA</a>
  <button class="burger" id="burger" aria-label="menu"><span></span><span></span><span></span></button>
  <nav class="main" id="nav">
    <a href="index.html">Films</a>
    <a href="stills.html">Stills</a>
    <a href="about.html">About</a>
    <a href="contact.html" class="active">Contact</a>
    <div class="nav-social">
      <a href="https://www.instagram.com/yoshifilm429/?hl=ja" target="_blank" rel="noopener" aria-label="Instagram — Films"><svg viewBox="0 0 24 24" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg></a>
    </div>
  </nav>
</header>

<main>
  <div class="wrap">
    <span class="lbl">Contact</span>
    <p class="intro"><span class="intro-l1">ご依頼やご相談がございましたら、</span><span class="intro-l2">以下のフォームよりお気軽にお問い合わせください。</span></p>

    <form id="inquiry">
      <div class="field">
        <label for="f-name">お名前 <span class="req">(必須)</span></label>
        <input id="f-name" name="name" type="text" required>
      </div>

      <div class="field">
        <label for="f-email">メールアドレス <span class="req">(必須)</span></label>
        <input id="f-email" name="email" type="email" required>
      </div>

      <div class="field">
        <label for="f-project">ご依頼内容について <span class="req">(必須)</span></label>
        <textarea id="f-project" name="project" required></textarea>
      </div>

      <div class="field">
        <label for="f-notes">その他、ご質問やご要望など</label>
        <textarea id="f-notes" name="notes"></textarea>
      </div>

      <button type="submit" class="submit" id="submitBtn">送信</button>
      <p class="sent" id="sent">お問い合わせを受け付けました。内容を確認の上、追ってご連絡いたします。</p>
      <p class="sent error" id="errorMsg">送信に失敗しました。お手数ですが時間をおいて再度お試しください。</p>
    </form>
  </div>

  <footer>
    <div class="f-social">
      <a href="https://www.instagram.com/yoshifilm429/?hl=ja" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>Instagram — Films</a>
      <a href="https://www.instagram.com/yoshikazu_sakata/?hl=ja" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>Instagram — Stills</a>
    </div>
    <div class="f-meta"><span>© Yoshikazu Sakata</span></div>
  </footer>
</main>

<script>
  /* Formspree経由でフォーム送信(ページ遷移なし、ボタン一つで完結) */
  const FORMSPREE_ENDPOINT = "https://formspree.io/f/xrevnvzz";

  const form = document.getElementById('inquiry');
  const submitBtn = document.getElementById('submitBtn');
  const sentMsg = document.getElementById('sent');
  const errorMsg = document.getElementById('errorMsg');

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    sentMsg.classList.remove('show');
    errorMsg.classList.remove('show');
    submitBtn.disabled = true;
    submitBtn.textContent = '送信中…';

    try{
      const res = await fetch(FORMSPREE_ENDPOINT, {
        method: 'POST',
        headers: { 'Accept': 'application/json' },
        body: new FormData(form)
      });
      if(res.ok){
        sentMsg.classList.add('show');
        form.reset();
        submitBtn.textContent = '送信';
      }else{
        throw new Error('送信エラー');
      }
    }catch(err){
      errorMsg.classList.add('show');
      submitBtn.textContent = '送信';
    }finally{
      submitBtn.disabled = false;
    }
  });

  const b=document.getElementById('burger');
  b.onclick=()=>document.body.classList.toggle('open');
  document.querySelectorAll('#nav a').forEach(a=>a.addEventListener('click',()=>document.body.classList.remove('open')));
</script>
</body>
</html>
