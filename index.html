<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YOSHIKAZU SAKATA — Films</title>
<meta name="description" content="阪田義和 — Photographer &amp; Videographer based in Japan.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FCFCFA;--ink:#161513;--muted:#9C988F;--line:#E8E5DE;--frame:#F0EEE8;
    --sans:"Jost","Zen Kaku Gothic New",system-ui,sans-serif;--jp:"Zen Kaku Gothic New",system-ui,sans-serif;
    --gutter:clamp(18px,3.6vw,60px);--ease:cubic-bezier(.22,.61,.36,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-weight:300;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  img{display:block;max-width:100%}a{color:inherit;text-decoration:none}
  ::selection{background:var(--ink);color:var(--paper)}

  header{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
    padding:18px var(--gutter);border-bottom:1px solid var(--line)}
  header::before{content:"";position:absolute;inset:0;z-index:-1;
    background:color-mix(in srgb,var(--paper) 86%,transparent);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  .logo{font-size:12px;letter-spacing:.42em;font-weight:400;padding-left:.42em;white-space:nowrap}
  nav.main{display:flex;gap:clamp(16px,2.2vw,32px)}
  nav.main a{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);transition:color .35s var(--ease)}
  nav.main a:hover,nav.main a.active{color:var(--ink)}
  .nav-social{display:none}
  .burger{display:none;position:relative;z-index:60;flex-direction:column;gap:5px;background:none;border:0;cursor:pointer;padding:4px}
  .burger span{width:22px;height:1px;background:var(--ink);display:block;transition:.4s var(--ease)}

  /* ---------- showreel ---------- */
  .reel{position:relative;width:100%;background:#0e0d0b}
  .reel::before{content:"";display:block;padding-top:56.25%}
  .reel video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .reel .veil{position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(180deg,rgba(8,7,5,.22),rgba(8,7,5,0) 38%,rgba(8,7,5,.4) 100%)}
  .reel .statement{position:absolute;left:50%;bottom:clamp(22px,5vw,48px);transform:translateX(-50%);
    margin:0;padding:0 18px;text-align:center;white-space:nowrap;z-index:2;
    color:#fdfcfa;font-size:clamp(13px,1.8vw,18px);font-weight:300;letter-spacing:.14em;
    text-shadow:0 1px 14px rgba(0,0,0,.4)}
  @media(max-width:680px){.reel .statement{white-space:normal;letter-spacing:.06em;font-size:10.5px;line-height:1.55;bottom:10px}}
  /* ---------- films grid ---------- */
  .sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:18px;flex-wrap:wrap;
    padding:clamp(50px,7vw,92px) var(--gutter) clamp(28px,4vw,46px)}
  .sec-head h1{font-weight:300;font-size:clamp(15px,1.7vw,19px);letter-spacing:.3em;text-transform:uppercase}
  .sec-head .meta{font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted)}

  .films{display:grid;grid-template-columns:repeat(2,1fr);gap:clamp(26px,3vw,52px) clamp(14px,1.8vw,30px);padding:0 var(--gutter)}
  @media(max-width:720px){.films{grid-template-columns:1fr}}
  .film{position:relative;opacity:0;transform:translateY(20px);transition:opacity 1s var(--ease),transform 1s var(--ease)}
  .film.in{opacity:1;transform:none}
  .film .thumb{position:relative;overflow:hidden;background:var(--frame)}
  .film .thumb::before{content:"";display:block;padding-top:56.25%}
  .film .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .film .thumb .play{position:absolute;inset:0;display:grid;place-items:center}
  .film .thumb .play i{width:56px;height:56px;border:1px solid rgba(255,255,255,.85);border-radius:50%;display:grid;place-items:center;
    background:rgba(20,18,15,.25)}
  .film .thumb .play i::after{content:"";margin-left:3px;border-left:10px solid #fff;border-top:6px solid transparent;border-bottom:6px solid transparent}
  .film .thumb .mk{position:absolute;left:14px;top:13px;font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,.55)}
  .cap{margin-top:14px}
  .cap .t{font-family:var(--jp);font-size:14px;letter-spacing:.04em}

  footer{padding:clamp(60px,9vw,100px) var(--gutter) 36px;display:flex;flex-direction:column;align-items:center;gap:22px;
    margin-top:clamp(50px,8vw,90px);border-top:1px solid var(--line)}
  .f-social{display:flex;gap:30px;flex-wrap:wrap;justify-content:center}
  .f-social a{display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);transition:color .35s var(--ease)}
  .f-social a:hover{color:var(--ink)}
  .f-social svg{width:13px;height:13px;stroke:currentColor;fill:none}
  .f-meta{display:flex;gap:18px}
  .f-meta span{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}

  @media(max-width:680px){
    .burger{display:flex}
    nav.main{position:fixed;inset:0;background:var(--paper);flex-direction:column;align-items:center;justify-content:center;gap:36px;transform:translateY(-101%);transition:transform .6s var(--ease);z-index:40}
    body.open nav.main{transform:none}
    nav.main a{font-size:15px;letter-spacing:.3em;color:var(--ink)}
    .nav-social{display:flex;gap:26px;margin-top:4px}
    .nav-social a{color:var(--muted);transition:color .35s var(--ease)}
    .nav-social a:hover{color:var(--ink)}
    .nav-social svg{width:19px;height:19px;stroke:currentColor;fill:none}
    body.open .burger span:nth-child(1){transform:translateY(6px) rotate(45deg)}
    body.open .burger span:nth-child(2){opacity:0}
    body.open .burger span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.film{opacity:1;transform:none}}

  /* ---------- video modal (YouTube unlisted playback) ---------- */
  .vmodal{position:fixed;inset:0;z-index:100;background:rgba(14,13,11,.96);
    display:flex;align-items:center;justify-content:center;
    opacity:0;visibility:hidden;transition:opacity .4s var(--ease);padding:clamp(16px,4vw,64px)}
  .vmodal.open{opacity:1;visibility:visible}
  .vmodal .vwrap{position:relative;width:100%;max-width:1100px;background:#000;
    opacity:0;transform:scale(.97);transition:opacity .35s var(--ease),transform .35s var(--ease)}
  .vmodal .vwrap::before{content:"";display:block;padding-top:56.25%}
  .vmodal.open .vwrap{opacity:1;transform:none}
  .vmodal iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .vm-close{position:fixed;top:clamp(10px,2vw,28px);right:clamp(10px,2vw,28px);background:none;border:0;cursor:pointer;
    color:#FCFCFA;opacity:.7;transition:opacity .25s var(--ease);z-index:101;padding:14px}
  .vm-close:hover{opacity:1}
  .vm-close svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.4}
  /* 再生ボタンはカスタムデザインのまま、cursor:pointerでYouTube標準カーソルを上書き */
  .film .thumb{cursor:pointer}
  .film .thumb .play i{cursor:pointer}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">YOSHIKAZU SAKATA</a>
  <button class="burger" id="burger" aria-label="menu"><span></span><span></span><span></span></button>
  <nav class="main" id="nav">
    <a href="index.html" class="active">Films</a>
    <a href="stills.html">Stills</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <div class="nav-social">
      <a href="https://www.instagram.com/yoshifilm429/?hl=ja" target="_blank" rel="noopener" aria-label="Instagram — Films"><svg viewBox="0 0 24 24" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg></a>
    </div>
  </nav>
</header>

<main>
  <section class="reel" id="reel">
    <video id="reelVideo" src="https://pub-e80f77a891d84e83ad3035613393f09a.r2.dev/hero.mp4"
           autoplay loop muted playsinline></video>
    <div class="veil"></div>
    <p class="statement">Observing Light, Space and Human Stories</p>
  </section>

  <div class="sec-head">
    <h1>Selected Work — Films</h1>
  </div>
  <section class="films" id="films"><!-- films injected --></section>

  <footer>
    <div class="f-social">
      <a href="https://www.instagram.com/yoshifilm429/?hl=ja" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>Instagram — Films</a>
      <a href="https://www.instagram.com/yoshikazu_sakata/?hl=ja" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>Instagram — Stills</a>
    </div>
    <div class="f-meta"><span>© Yoshikazu Sakata</span></div>
  </footer>
</main>

<div class="vmodal" id="vmodal" role="dialog" aria-modal="true" aria-label="Video player">
  <button class="vm-close" id="vmClose" aria-label="Close"><svg viewBox="0 0 24 24"><path d="M5 5l14 14M19 5L5 19"/></svg></button>
  <div class="vwrap" id="vwrap"></div>
</div>

<script>

  /* 作品動画リスト。新しい作品は配列の先頭に追加。
     表示順はページ読み込みのたびにランダムにシャッフルされます。
     youtube: 動画ID のみ(URLではなくIDだけ)。thumb で任意のサムネ画像URLを指定可。 */
  const films=[
    {t:"Film 1", c:"", youtube:"SXk0Y4EMowU"},
    {t:"Film 2", c:"", youtube:"mBnladCK65c"},
    {t:"Film 3", c:"", youtube:"gqrn--sqWUQ"},
    {t:"Film 4", c:"", youtube:"UDP_OrU4ivI"},
    {t:"Film 5", c:"", youtube:"6f_vOlGbwsU"},
    {t:"Film 6", c:"", youtube:"OhOlswaDdQ8"},
    {t:"Film 7", c:"", youtube:"6QZfTGWb7S0"}
  ];
  // stills同様、開くたびにランダムな順序で表示
  function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
  const tones=["#DDE0DB","#E1DBD3","#DADCE1","#E3DED5","#DBE0DD","#E1DDD4"];
  const wrap=document.getElementById('films');
  shuffle(films).forEach((f,i)=>{
    const a=document.createElement('div');a.className='film';
    const tone=tones[i%tones.length];
    const thumbUrl=f.thumb||`https://i.ytimg.com/vi/${f.youtube}/maxresdefault.jpg`;
    const cover=f.youtube?`<img src="${thumbUrl}" alt="" data-yid="${f.youtube}" data-has-thumb="${f.thumb?'1':'0'}">`:`<span class="mk">${String(i+1).padStart(2,'0')}</span>`;
    a.innerHTML=`<div class="thumb" style="${f.youtube?'':`background:${tone}`}">${cover}<div class="play"><i></i></div></div>
      <div class="cap"><span class="t" data-yt="${f.youtube}"></span></div>`;
    a.querySelector('.thumb').addEventListener('click',()=>openVideo(f.youtube));
    wrap.appendChild(a);
  });
  // YouTube oEmbed APIでタイトルを非同期取得(公開動画のみ取得可、限定公開は空欄になる場合あり)
  document.querySelectorAll('.cap .t[data-yt]').forEach(el=>{
    const id=el.dataset.yt;
    fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`)
      .then(r=>r.ok?r.json():null)
      .then(data=>{ if(data && data.title) el.textContent=data.title; })
      .catch(()=>{});
  });
  /* maxresdefaultが未生成の動画は120x90のプレースホルダーが返るため、hqdefaultへ自動フォールバック */
  document.querySelectorAll('.film img[data-yid]').forEach(img=>{
    img.addEventListener('load',function(){
      if(this.dataset.hasThumb==='0' && this.naturalWidth===120 && this.naturalHeight===90){
        this.src=`https://i.ytimg.com/vi/${this.dataset.yid}/hqdefault.jpg`;
      }
    });
  });
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}}),{threshold:.14});
  document.querySelectorAll('.film').forEach((f,i)=>{f.style.transitionDelay=(i%2)*65+'ms';io.observe(f)});
  const b=document.getElementById('burger');
  b.onclick=()=>document.body.classList.toggle('open');
  document.querySelectorAll('#nav a').forEach(a=>a.addEventListener('click',()=>document.body.classList.remove('open')));

  /* ---- 作品動画モーダル(YouTube限定公開を埋め込み再生) ---- */
  const vmodal=document.getElementById('vmodal');
  const vwrap=document.getElementById('vwrap');
  function openVideo(id){
    vwrap.innerHTML=`<iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0" title="film" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
    vmodal.classList.add('open');
    document.body.style.overflow='hidden';
  }
  function closeVideo(){
    vmodal.classList.remove('open');
    vwrap.innerHTML=''; // 再生停止のため埋め込みごと破棄
    document.body.style.overflow='';
  }
  document.getElementById('vmClose').addEventListener('click',closeVideo);
  vmodal.addEventListener('click',e=>{ if(e.target===vmodal) closeVideo(); });
  document.addEventListener('keydown',e=>{ if(e.key==='Escape' && vmodal.classList.contains('open')) closeVideo(); });
</script>
</body>
</html>
