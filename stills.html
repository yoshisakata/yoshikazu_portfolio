<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YOSHIKAZU SAKATA — Stills</title>
<meta name="description" content="阪田義和 — Photographer based in Japan.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FCFCFA;--ink:#161513;--muted:#9C988F;--line:#E8E5DE;--frame:#F0EEE8;
    --sans:"Jost","Zen Kaku Gothic New",system-ui,sans-serif;--jp:"Zen Kaku Gothic New",system-ui,sans-serif;
    --gutter:clamp(18px,3.6vw,60px);--ease:cubic-bezier(.22,.61,.36,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-weight:300;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  img{display:block;max-width:100%}a{color:inherit;text-decoration:none}
  ::selection{background:var(--ink);color:var(--paper)}

  header{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
    padding:18px var(--gutter);border-bottom:1px solid var(--line)}
  header::before{content:"";position:absolute;inset:0;z-index:-1;
    background:color-mix(in srgb,var(--paper) 86%,transparent);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  .logo{font-size:12px;letter-spacing:.42em;font-weight:400;padding-left:.42em;white-space:nowrap}
  nav.main{display:flex;gap:clamp(16px,2.2vw,32px)}
  nav.main a{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);transition:color .35s var(--ease)}
  nav.main a:hover,nav.main a.active{color:var(--ink)}
  .nav-social{display:none}
  .burger{display:none;position:relative;z-index:60;flex-direction:column;gap:5px;background:none;border:0;cursor:pointer;padding:4px}
  .burger span{width:22px;height:1px;background:var(--ink);display:block;transition:.4s var(--ease)}

  .grid{display:block;column-count:3;column-gap:clamp(14px,1.8vw,30px);
    padding:clamp(28px,4.5vw,52px) var(--gutter) 0}
  @media(max-width:880px){.grid{column-count:2}}
  @media(max-width:540px){.grid{column-count:2;column-gap:8px;padding-left:14px;padding-right:14px}}
  .item{opacity:0;transform:translateY(20px);transition:opacity 1s var(--ease),transform 1s var(--ease);
    display:inline-block;width:100%;break-inside:avoid;margin:0 0 clamp(14px,1.8vw,30px)}
  .item.in{opacity:1;transform:none}
  .item .ph{position:relative;overflow:hidden;background:var(--frame)}
  .item .ph img{position:static;width:100%;height:auto;display:block;transition:transform 1.5s var(--ease)}
  @media(max-width:540px){
    .grid{column-gap:8px}
    .item{margin:0 0 8px}
  }
  .item:hover .ph img{transform:scale(1.03)}
  .item .ph .mk{position:absolute;left:14px;top:13px;font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:rgba(22,21,19,.26)}

  footer{padding:clamp(60px,9vw,100px) var(--gutter) 36px;display:flex;flex-direction:column;align-items:center;gap:22px;
    margin-top:clamp(50px,8vw,90px);border-top:1px solid var(--line)}
  .f-social{display:flex;gap:30px;flex-wrap:wrap;justify-content:center}
  .f-social a{display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);transition:color .35s var(--ease)}
  .f-social a:hover{color:var(--ink)}
  .f-social svg{width:13px;height:13px;stroke:currentColor;fill:none}
  .f-meta{display:flex;gap:18px}
  .f-meta span{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}

  @media(max-width:680px){
    .burger{display:flex}
    nav.main{position:fixed;inset:0;background:var(--paper);flex-direction:column;align-items:center;justify-content:center;gap:36px;transform:translateY(-101%);transition:transform .6s var(--ease);z-index:40}
    body.open nav.main{transform:none}
    nav.main a{font-size:15px;letter-spacing:.3em;color:var(--ink)}
    .nav-social{display:flex;gap:26px;margin-top:4px}
    .nav-social a{color:var(--muted);transition:color .35s var(--ease)}
    .nav-social a:hover{color:var(--ink)}
    .nav-social svg{width:19px;height:19px;stroke:currentColor;fill:none}
    body.open .burger span:nth-child(1){transform:translateY(6px) rotate(45deg)}
    body.open .burger span:nth-child(2){opacity:0}
    body.open .burger span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.item{opacity:1;transform:none}}

  .item .ph{cursor:zoom-in}
  .lightbox{position:fixed;inset:0;z-index:100;background:rgba(22,21,19,.96);
    display:flex;align-items:center;justify-content:center;
    opacity:0;visibility:hidden;transition:opacity .4s var(--ease);padding:clamp(16px,4vw,48px)}
  .lightbox.open{opacity:1;visibility:visible}
  .lightbox img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
    opacity:0;transform:scale(.97);transition:opacity .35s var(--ease),transform .35s var(--ease)}
  .lightbox.open img{opacity:1;transform:none}
  .lb-close,.lb-prev,.lb-next{position:fixed;background:none;border:0;cursor:pointer;color:#FCFCFA;
    opacity:.7;transition:opacity .25s var(--ease);z-index:101;padding:14px}
  .lb-close:hover,.lb-prev:hover,.lb-next:hover{opacity:1}
  .lb-close{top:clamp(10px,2vw,28px);right:clamp(10px,2vw,28px)}
  .lb-close svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.4}
  .lb-prev,.lb-next{top:50%;transform:translateY(-50%)}
  .lb-prev{left:clamp(4px,1.5vw,20px)}
  .lb-next{right:clamp(4px,1.5vw,20px)}
  .lb-prev svg,.lb-next svg{width:28px;height:28px;stroke:currentColor;fill:none;stroke-width:1.2}
  @media(max-width:680px){
    .lb-prev,.lb-next{padding:10px}
    .lb-prev svg,.lb-next svg{width:22px;height:22px}
  }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">YOSHIKAZU SAKATA</a>
  <button class="burger" id="burger" aria-label="menu"><span></span><span></span><span></span></button>
  <nav class="main" id="nav">
    <a href="index.html">Films</a>

    <div class="nav-social">

<main>

  <footer>
    <div class="f-social">

      <a href="https://www.instagram.com/yoshikazu_sakata/?hl=ja" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>Instagram — Stills</a>
    </div>
    <div class="f-meta"><span>© Yoshikazu Sakata</span></div>
  </footer>
</main>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
  <button class="lb-close" id="lbClose" aria-label="Close"><svg viewBox="0 0 24 24"><path d="M5 5l14 14M19 5L5 19"/></svg></button>
  <button class="lb-prev" id="lbPrev" aria-label="Previous"><svg viewBox="0 0 24 24"><path d="M15 4l-8 8 8 8"/></svg></button>
  <img id="lbImg" src="" alt="">
  <button class="lb-next" id="lbNext" aria-label="Next"><svg viewBox="0 0 24 24"><path d="M9 4l8 8-8 8"/></svg></button>
</div>

    {img:"photos/XT508457.jpg"}
  ];
  const tones=["#E6E3DC","#DFE0DB","#E7DFD7","#DEDCE2","#E4E0D6","#DBDFDC","#E9E4DB","#E0DCD4"];
  /* 開くたびに並びをシャッフル */
  function shuffle(arr){
    const a=arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }
  const g=document.getElementById('work');
  const displayed=shuffle(works); // ライトボックスでの前後移動用に表示順を保持
  const imgList=displayed.filter(w=>w.img).map(w=>w.img);
  displayed.forEach((w,i)=>{
    const el=document.createElement('div');el.className='item';
    const tone=tones[i%tones.length];
    const inner=w.img?`<img src="${w.img}" alt="${w.t||''}">`:`<span class="mk">${String(i+1).padStart(2,'0')}</span>`;
    el.innerHTML=`<div class="ph" style="${w.img?'':`background:${tone}`}">${inner}</div>`;
    if(w.img){
      const lbIndex=imgList.indexOf(w.img);
      el.querySelector('.ph').addEventListener('click',()=>openLightbox(lbIndex));
    }
    g.appendChild(el);
  });
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}}),{threshold:.12});
  document.querySelectorAll('.item').forEach((el,i)=>{el.style.transitionDelay=(i%3)*55+'ms';io.observe(el)});
  const b=document.getElementById('burger');
  b.onclick=()=>document.body.classList.toggle('open');
  document.querySelectorAll('#nav a').forEach(a=>a.addEventListener('click',()=>document.body.classList.remove('open')));

  /* ライトボックス */
  const lb=document.getElementById('lightbox');
  const lbImg=document.getElementById('lbImg');
  let lbIndex=0;
  function showLb(i){
    lbIndex=(i+imgList.length)%imgList.length;
    lbImg.src=imgList[lbIndex];
  }
  function openLightbox(i){
    showLb(i);
    lb.classList.add('open');
    document.body.style.overflow='hidden';
  }
  function closeLightbox(){
    lb.classList.remove('open');
    document.body.style.overflow='';
  }
  document.getElementById('lbClose').addEventListener('click',closeLightbox);
  document.getElementById('lbPrev').addEventListener('click',e=>{e.stopPropagation();showLb(lbIndex-1)});
  document.getElementById('lbNext').addEventListener('click',e=>{e.stopPropagation();showLb(lbIndex+1)});
  lb.addEventListener('click',e=>{ if(e.target===lb) closeLightbox(); });
  document.addEventListener('keydown',e=>{
    if(!lb.classList.contains('open')) return;
    if(e.key==='Escape') closeLightbox();
    if(e.key==='ArrowLeft') showLb(lbIndex-1);
    if(e.key==='ArrowRight') showLb(lbIndex+1);
  });
</script>
