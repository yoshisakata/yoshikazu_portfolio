<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YOSHIKAZU SAKATA — Stills</title>
<meta name="description" content="阪田義和 — Photographer based in Japan.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FCFCFA;--ink:#161513;--muted:#9C988F;--line:#E8E5DE;--frame:#F0EEE8;
    --sans:"Jost","Zen Kaku Gothic New",system-ui,sans-serif;--jp:"Zen Kaku Gothic New",system-ui,sans-serif;
    --gutter:clamp(18px,3.6vw,60px);--ease:cubic-bezier(.22,.61,.36,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-weight:300;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  img{display:block;max-width:100%}a{color:inherit;text-decoration:none}
  ::selection{background:var(--ink);color:var(--paper)}

  header{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
    padding:18px var(--gutter);border-bottom:1px solid var(--line)}
  header::before{content:"";position:absolute;inset:0;z-index:-1;
    background:color-mix(in srgb,var(--paper) 86%,transparent);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  .logo{font-size:12px;letter-spacing:.42em;font-weight:400;padding-left:.42em;white-space:nowrap}
  nav.main{display:flex;gap:clamp(16px,2.2vw,32px)}
  nav.main a{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);transition:color .35s var(--ease)}
  nav.main a:hover,nav.main a.active{color:var(--ink)}
  .nav-social{display:none}
  .burger{display:none;position:relative;z-index:60;flex-direction:column;gap:5px;background:none;border:0;cursor:pointer;padding:4px}
  .burger span{width:22px;height:1px;background:var(--ink);display:block;transition:.4s var(--ease)}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:clamp(175px,22.5vw,325px);gap:clamp(20px,2.4vw,46px) clamp(14px,1.8vw,30px);
    grid-auto-flow:dense;padding:clamp(28px,4.5vw,52px) var(--gutter) 0}
  @media(max-width:880px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:540px){.grid{grid-template-columns:repeat(2,1fr);gap:10px 8px;padding-left:14px;padding-right:14px}}
  .item{opacity:0;transform:translateY(20px);transition:opacity 1s var(--ease),transform 1s var(--ease)}
  .item.in{opacity:1;transform:none}
  .item.wide{grid-column:span 2}
  .item.tall{grid-row:span 2}
  .item.big{grid-column:span 2;grid-row:span 2}
  .item .ph{position:relative;overflow:hidden;background:var(--frame);height:100%}
  .item .ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform 1.5s var(--ease)}
  @media(max-width:540px){
    .grid{display:block;column-count:2;column-gap:8px;padding-left:14px;padding-right:14px}
    .item{display:inline-block;width:100%;break-inside:avoid;margin:0 0 8px}
    .item .ph::before{content:none}
    .item .ph img{position:static;width:100%;height:auto;display:block}
  }
  .item:hover .ph img{transform:scale(1.03)}
  .item .ph .mk{position:absolute;left:14px;top:13px;font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:rgba(22,21,19,.26)}

  footer{padding:clamp(60px,9vw,100px) var(--gutter) 36px;display:flex;flex-direction:column;align-items:center;gap:22px;
    margin-top:clamp(50px,8vw,90px);border-top:1px solid var(--line)}
  .f-social{display:flex;gap:30px;flex-wrap:wrap;justify-content:center}
  .f-social a{display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);transition:color .35s var(--ease)}
  .f-social a:hover{color:var(--ink)}
  .f-social svg{width:13px;height:13px;stroke:currentColor;fill:none}
  .f-meta{display:flex;gap:18px}
  .f-meta span{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}

  @media(max-width:680px){
    .burger{display:flex}
    nav.main{position:fixed;inset:0;background:var(--paper);flex-direction:column;align-items:center;justify-content:center;gap:36px;transform:translateY(-101%);transition:transform .6s var(--ease);z-index:40}
    body.open nav.main{transform:none}
    nav.main a{font-size:15px;letter-spacing:.3em;color:var(--ink)}
    .nav-social{display:flex;gap:26px;margin-top:4px}
    .nav-social a{color:var(--muted);transition:color .35s var(--ease)}
    .nav-social a:hover{color:var(--ink)}
    .nav-social svg{width:19px;height:19px;stroke:currentColor;fill:none}
    body.open .burger span:nth-child(1){transform:translateY(6px) rotate(45deg)}
    body.open .burger span:nth-child(2){opacity:0}
    body.open .burger span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.item{opacity:1;transform:none}}
</style>
</head>

    {img:"photos/XT508423.jpg"},
    {img:"photos/XT508457.jpg"}
  ];
  const tones=["#E6E3DC","#DFE0DB","#E7DFD7","#DEDCE2","#E4E0D6","#DBDFDC","#E9E4DB","#E0DCD4"];
  /* 開くたびに並びをシャッフル */
  function shuffle(arr){
    const a=arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }
  const g=document.getElementById('work');
  const shuffled=shuffle(works);
  /* サイズバリエーションを付与: 元のwide指定は尊重しつつ、一定間隔でtall/bigを混ぜて隙間を減らす */
  function assignSizes(list){
    let wideStreak=0, normalStreak=0;
    return list.map((w,i)=>{
      let size='normal';
      if(w.wide){
        wideStreak++; normalStreak=0;
        // wideが3枚に1回くらいの頻度でbig(2x2)に格上げ、ただし連続big回避
        size=(wideStreak%3===0)?'big':'wide';
      }else{
        normalStreak++; wideStreak=0;
        // normalが4枚に1回くらいの頻度でtall(1x2)に格上げ
        size=(normalStreak%4===0)?'tall':'normal';
      }
      return {...w,size};
    });
  }
  const sized=assignSizes(shuffled);
  sized.forEach((w,i)=>{
    const el=document.createElement('div');
    const sizeClass=w.size==='normal'?'':' '+w.size;
    el.className='item'+sizeClass;
    const tone=tones[i%tones.length];
    const inner=w.img?`<img src="${w.img}" alt="${w.t||''}">`:`<span class="mk">${String(i+1).padStart(2,'0')}</span>`;
    el.innerHTML=`<div class="ph" style="${w.img?'':`background:${tone}`}">${inner}</div>`;
    g.appendChild(el);
  });
  /* 末尾で横幅2列(wide/big)が列幅を余らせる場合、後ろから順に通常サイズへ縮小して空白を防ぐ */
  function fixTrailingGap(){
    const items=Array.from(g.children);
    // まず全アイテムを元のサイズ指定に戻す(リサイズ時の再計算のため)
    items.forEach(el=>{
      const orig=el.dataset.size;
      el.className='item'+(orig&&orig!=='normal'?' '+orig:'');
    });
    if(window.innerWidth<=540) return; // モバイルはmasonryなので対象外
    // レンダリング後の実位置を見て、各アイテムの右端・下端の最大値(グリッド全体の輪郭)を求め、
    // 末尾アイテムがその輪郭より内側で終わって右側に空白を作っていないか判定する
    let attempts=0;
    function detectAndFix(){
      attempts++;
      if(attempts>15) return;
      const rects=items.map(el=>el.getBoundingClientRect());
      const gridRight=Math.max(...rects.map(r=>r.right));
      const gridBottom=Math.max(...rects.map(r=>r.bottom));
      const lastRowIdx=items.map((el,i)=>i).filter(i=>Math.abs(rects[i].bottom-gridBottom)<2);
      const lastRowRight=Math.max(...lastRowIdx.map(i=>rects[i].right));
      const hasGap=(gridRight-lastRowRight)>20;
      if(!hasGap) return;
      // 優先1: 最後の行の中にbig/wide/tallがあれば、それを縮小
      let target=null;
      for(const i of lastRowIdx){ if(items[i].classList.contains('big')){ target=items[i]; break; } }
      if(!target) for(const i of lastRowIdx){ if(items[i].classList.contains('wide')){ target=items[i]; break; } }
      if(!target) for(const i of lastRowIdx){ if(items[i].classList.contains('tall')){ target=items[i]; break; } }
      // 優先2: 最後の行が縮小不可能な通常アイテムのみの場合、直前(最後の行より上)にある
      // 最も末尾に近いwide/bigを縮小して、後続アイテムを最後の行に呼び込む
      if(!target){
        const minLastIdx=Math.min(...lastRowIdx);
        for(let i=minLastIdx-1;i>=0;i--){
          const el=items[i];
          if(el.classList.contains('big')){ target=el; break; }
          if(el.classList.contains('wide')){ target=el; break; }
          if(el.classList.contains('tall')){ target=el; break; }
        }
      }
      if(target){
        if(target.classList.contains('big')){ target.classList.remove('big'); target.classList.add('tall'); }
        else if(target.classList.contains('wide')){ target.classList.remove('wide'); }
        else if(target.classList.contains('tall')){ target.classList.remove('tall'); }
        requestAnimationFrame(detectAndFix);
      }
    }
    requestAnimationFrame(detectAndFix);
  }
  // 各要素に元のサイズ指定をdata属性として保持(リサイズ再計算用)
  Array.from(g.children).forEach((el,i)=>{ el.dataset.size = sized[i].size; });
  fixTrailingGap();
  window.addEventListener('resize',fixTrailingGap);
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}}),{threshold:.12});
  document.querySelectorAll('.item').forEach((el,i)=>{el.style.transitionDelay=(i%3)*55+'ms';io.observe(el)});
  const b=document.getElementById('burger');
  b.onclick=()=>document.body.classList.toggle('open');
  document.querySelectorAll('#nav a').forEach(a=>a.addEventListener('click',()=>document.body.classList.remove('open')));
</script>
